# Historias-de-terror
Básicamente aca pueden poner sus historias y leer las demás que publiquen saludos 
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historias de Terror</title>
  <style>
    body {
      font-family: 'Creepster', cursive, Arial, sans-serif;
      background-color: #111;
      color: #eee;
      margin: 0;
      padding: 0;
    }
    @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');

    header {
      background-color: #222;
      padding: 1rem;
      text-align: center;
    }
    header h1 {
      color: #f33;
      margin: 0;
      font-family: 'Creepster', cursive;
      text-shadow: 2px 2px #000;
    }
    main {
      padding: 1rem;
      max-width: 800px;
      margin: auto;
    }
    .story {
      background-color: #222;
      border: 1px solid #333;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      transition: transform 0.2s;
    }
    .story:hover {
      transform: scale(1.02);
    }
    .story h3 {
      color: #f33;
      margin-top: 0;
    }
    form {
      background-color: #222;
      padding: 1rem;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 2rem;
    }
    input, textarea, button {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      border-radius: 4px;
      border: none;
    }
    button {
      background-color: #f33;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #d00;
    }
  </style>
</head>
<body>
  <header>
    <h1>Historias de Terror</h1>
    <p>Comparte tu miedo con el mundo</p>
  </header>
  <main>
    <form id="storyForm">
      <h2>Sube tu historia</h2>
      <input type="text" id="author" placeholder="Tu nombre" required>
      <input type="text" id="title" placeholder="Título de la historia" required>
      <textarea id="content" rows="5" placeholder="Escribe tu historia aquí..." required></textarea>
      <button type="submit">Enviar historia</button>
    </form>

    <div id="storiesContainer">
      <h2>Historias recientes</h2>
    </div>
  </main>

  <script>
    const form = document.getElementById('storyForm');
    const container = document.getElementById('storiesContainer');

    let stories = [
      {
        author: "Ana",
        title: "El susurro en la noche",
        content: "Cada noche escucho un susurro que llama mi nombre. Anoche me respondió desde dentro de mi habitación..."
      },
      {
        author: "Carlos",
        title: "El espejo maldito",
        content: "Compré un espejo antiguo y cada vez que me miro, mi reflejo hace cosas que yo no hago. Una noche sonrió sin que yo lo hiciera."
      },
      {
        author: "Lucía",
        title: "La llamada desconocida",
        content: "Recibí una llamada de un número desconocido. Una voz susurraba: 'Estoy dentro de tu casa'."
      },
      {
        author: "Diego",
        title: "La sombra en el pasillo",
        content: "Vi una sombra que cruzaba el pasillo cuando todos dormían. Al acercarme, escuché mi propio suspiro detrás de mí."
      }
    ];

    if(!localStorage.getItem('terrorStories')) {
      localStorage.setItem('terrorStories', JSON.stringify(stories));
    } else {
      stories = JSON.parse(localStorage.getItem('terrorStories'));
    }

    function renderStories() {
      container.innerHTML = '<h2>Historias recientes</h2>';
      stories.forEach((story) => {
        const div = document.createElement('div');
        div.classList.add('story');
        div.innerHTML = `<h3>${story.title}</h3><p><strong>${story.author}</strong></p><p>${story.content}</p>`;
        container.appendChild(div);
      });
    }

    function addStory(author, title, content) {
      const newStory = { author, title, content };
      stories.unshift(newStory);
      localStorage.setItem('terrorStories', JSON.stringify(stories));
      renderStories();
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const author = document.getElementById('author').value.trim();
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      if(author && title && content) {
        addStory(author, title, content);
        form.reset();
      }
    });

    renderStories();
  </script>
</body>
</html>
